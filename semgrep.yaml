rules:
- id: hardcoded-key-or-password
  languages: [python]
  message: |
    CRITICAL: Hardcoded credential detected!
    Avoid storing secrets in source code.
    Use environment variables or a secrets manager.
  severity: ERROR

  patterns:
    - pattern: $NAME = "$VALUE"

  metavariable-regex:
    metavariable: $NAME
    regex: '(?i)(api[_-]?key|secret|password|passwd|token|access[_-]?key)'
    
  pattern-not-inside:
    - pattern: self.$NAME = "$VALUE"